# פריסה ב-Render כאתר סטטי (Static Site).
# אין צורך במפתח סוד בזמן ריצה — ה-TTS מופק מראש ונשמר בריפו.
services:
  - type: web
    name: sound-match
    runtime: static
    buildCommand: npm ci && npm run build
    staticPublishPath: ./dist
    pullRequestPreviewsEnabled: true
    routes:
      # SPA fallback — כל נתיב מוגש מ-index.html
      - type: rewrite
        source: /*
        destination: /index.html
    headers:
      - path: /assets/*
        name: Cache-Control
        value: public, max-age=31536000, immutable
      - path: /audio/*
        name: Cache-Control
        value: public, max-age=604800
      - path: /images/*
        name: Cache-Control
        value: public, max-age=604800
